<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact — 54 Global Afrikan</title>
    <meta name="description" content="Get in touch with 54 Global Afrikan — Praise Church International, Halel School Nairobi, and Community Leadership programs." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" />
    <style>
      :root {
        --bg: #0b0a07;
        --surface: #14120d;
        --border: #2a2620;
        --text: #f5efe2;
        --muted: #a59f8f;
        --gold: #f5d27a;
        --gold-2: #e0b85a;
        --blue: #3b82f6;
        --red: #d94343;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background:
          radial-gradient(1200px 600px at 80% -10%, rgba(245,210,122,0.10), transparent 60%),
          radial-gradient(900px 500px at -10% 110%, rgba(59,130,246,0.10), transparent 60%),
          var(--bg);
        color: var(--text);
        min-height: 100vh;
        line-height: 1.6;
      }
      .container { max-width: 880px; margin: 0 auto; padding: 64px 24px; }
      header { text-align: center; margin-bottom: 40px; }
      .eyebrow {
        display: inline-block; font-size: 12px; letter-spacing: 0.2em;
        text-transform: uppercase; color: var(--gold);
        padding: 6px 14px; border: 1px solid rgba(245,210,122,0.3);
        border-radius: 999px; margin-bottom: 18px;
      }
      h1 {
        font-family: 'Playfair Display', serif;
        font-size: clamp(34px, 5vw, 52px); font-weight: 700;
        margin: 0 0 12px; line-height: 1.1;
      }
      h1 .accent {
        background: linear-gradient(135deg, var(--gold), var(--gold-2));
        -webkit-background-clip: text; background-clip: text; color: transparent;
      }
      header p { color: var(--muted); max-width: 560px; margin: 0 auto; }
      form {
        background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
        border: 1px solid var(--border); border-radius: 24px;
        padding: 32px; backdrop-filter: blur(8px);
        display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
      }
      .full { grid-column: 1 / -1; }
      label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.05em; text-transform: uppercase; }
      input, select, textarea {
        width: 100%; background: rgba(0,0,0,0.35); border: 1px solid var(--border);
        color: var(--text); padding: 12px 14px; border-radius: 12px;
        font: inherit; outline: none; transition: border .15s, box-shadow .15s;
      }
      input:focus, select:focus, textarea:focus {
        border-color: var(--gold);
        box-shadow: 0 0 0 3px rgba(245,210,122,0.18);
      }
      textarea { resize: vertical; min-height: 130px; }
      button {
        font: inherit; font-weight: 600; cursor: pointer;
        background: linear-gradient(135deg, var(--gold), var(--gold-2));
        color: #1a1408; border: none; padding: 14px 22px;
        border-radius: 999px; transition: transform .15s, box-shadow .15s;
        box-shadow: 0 10px 30px -10px rgba(245,210,122,0.5);
      }
      button:hover { transform: translateY(-1px); box-shadow: 0 14px 36px -10px rgba(245,210,122,0.6); }
      .hp { position: absolute; left: -9999px; }
      footer { text-align: center; margin-top: 28px; color: var(--muted); font-size: 13px; }
      @media (max-width: 640px) { form { grid-template-columns: 1fr; padding: 22px; } }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <span class="eyebrow">Contact & Partnership</span>
        <h1>Let's build the future <span class="accent">together.</span></h1>
        <p>Reach out for partnerships, prayer requests, school admissions, or community programs — we'd love to hear from you.</p>
      </header>

      <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" action="/thank-you.html">
        <input type="hidden" name="form-name" value="contact" />
        <p class="hp"><label>Don't fill this out: <input name="bot-field" /></label></p>

        <div>
          <label for="name">Full name</label>
          <input id="name" name="name" type="text" required />
        </div>
        <div>
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required />
        </div>
        <div class="full">
          <label for="phone">Phone (optional)</label>
          <input id="phone" name="phone" type="tel" />
        </div>
        <div class="full">
          <label for="interest">I'd like to…</label>
          <select id="interest" name="interest">
            <option>Partner with the ministry</option>
            <option>Enquire about school admissions</option>
            <option>Submit a prayer request</option>
            <option>Join a community program</option>
            <option>Something else</option>
          </select>
        </div>
        <div class="full">
          <label for="message">Your message</label>
          <textarea id="message" name="message" required></textarea>
        </div>
        <div class="full">
          <button type="submit">Send message</button>
        </div>
      </form>

      <footer>© 54 Global Afrikan · Nairobi, Kenya</footer>
    </div>
  </body>
</html>
