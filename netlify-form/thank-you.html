<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Thank you — 54 Global Afrikan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:wght@700&display=swap" />
    <style>
      body {
        margin: 0; min-height: 100vh; display: grid; place-items: center;
        background: radial-gradient(900px 500px at 50% -10%, rgba(245,210,122,0.12), transparent 60%), #0b0a07;
        color: #f5efe2; font-family: 'Inter', sans-serif; padding: 24px;
      }
      .card { text-align: center; max-width: 520px; }
      h1 {
        font-family: 'Playfair Display', serif; font-size: 44px; margin: 0 0 12px;
        background: linear-gradient(135deg, #f5d27a, #e0b85a);
        -webkit-background-clip: text; background-clip: text; color: transparent;
      }
      p { color: #a59f8f; margin: 0 0 24px; }
      a {
        display: inline-block; padding: 12px 24px; border-radius: 999px;
        background: linear-gradient(135deg, #f5d27a, #e0b85a); color: #1a1408;
        text-decoration: none; font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Asante sana</h1>
      <p>Your message has been received. Our team will reach out shortly.</p>
      <a href="/">Back to form</a>
    </div>
  </body>
</html>
